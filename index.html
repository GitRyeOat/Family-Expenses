<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FAFAF7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Split3">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Split3 — sibling expenses</title>
<style>
  :root{
    --bg:#FAFAF7; --ink:#20241F; --muted:#8A8F87; --line:#E4E4DD;
    --p0:#0E7C66; --p1:#C25E2E; --p2:#4A5FC1;
    --ok:#0E7C66; --warn:#C2822E; --err:#B33A3A;
    --radius:14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
    font-family:ui-rounded,-apple-system,"SF Pro Rounded",system-ui,Segoe UI,Roboto,sans-serif}
  body{max-width:460px; margin:0 auto; padding:14px 16px calc(24px + env(safe-area-inset-bottom));}
  header{display:flex; align-items:center; justify-content:space-between; padding:2px 2px 10px}
  header h1{font-size:15px; letter-spacing:.14em; text-transform:uppercase; font-weight:800; margin:0}
  .status{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted)}
  .dot{width:9px; height:9px; border-radius:50%; background:var(--muted)}
  .dot.ok{background:var(--ok)} .dot.pend{background:var(--warn)} .dot.off{background:var(--err)}
  .gear{background:none; border:none; font-size:18px; color:var(--muted); padding:4px 6px; cursor:pointer}

  .who{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:6px 0 14px}
  .who button{border:2px solid var(--line); background:#fff; border-radius:var(--radius);
    padding:16px 4px; font-size:16px; font-weight:700; color:var(--ink); cursor:pointer;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; transition:transform .06s}
  .who button:active{transform:scale(.96)}
  .who button.sel{color:#fff; border-color:transparent}
  .who button.sel.c0{background:var(--p0)} .who button.sel.c1{background:var(--p1)} .who button.sel.c2{background:var(--p2)}

  .amountwrap{display:flex; align-items:baseline; justify-content:center; gap:4px;
    border:2px solid var(--line); background:#fff; border-radius:var(--radius); padding:14px 12px; margin-bottom:10px}
  .amountwrap .cur{font-size:26px; font-weight:700; color:var(--muted)}
  #amount{border:none; outline:none; font-size:44px; font-weight:800; width:100%;
    font-variant-numeric:tabular-nums; background:transparent; color:var(--ink)}
  #amount::placeholder{color:#D8D8D0}

  #memo{width:100%; border:2px solid var(--line); background:#fff; border-radius:var(--radius);
    padding:13px 14px; font-size:16px; font-family:inherit; outline:none; margin-bottom:12px}
  #memo:focus,#amount:focus{caret-color:var(--ink)}

  #save{width:100%; border:none; border-radius:var(--radius); padding:17px; font-size:18px;
    font-weight:800; color:#fff; background:var(--muted); cursor:pointer; transition:transform .06s}
  #save:active{transform:scale(.98)}
  #save.c0{background:var(--p0)} #save.c1{background:var(--p1)} #save.c2{background:var(--p2)}
  #save:disabled{opacity:.45}

  .totals{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin:18px 0 6px}
  .tot{background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px 8px; text-align:center}
  .tot .n{font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase}
  .tot .v{font-size:17px; font-weight:800; font-variant-numeric:tabular-nums; margin-top:2px}
  .tot.c0 .n{color:var(--p0)} .tot.c1 .n{color:var(--p1)} .tot.c2 .n{color:var(--p2)}

  h2{font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin:16px 2px 8px}
  .entry{display:flex; align-items:center; gap:10px; background:#fff; border:1px solid var(--line);
    border-radius:12px; padding:11px 12px; margin-bottom:7px}
  .entry .bar{width:5px; align-self:stretch; border-radius:3px}
  .entry.c0 .bar{background:var(--p0)} .entry.c1 .bar{background:var(--p1)} .entry.c2 .bar{background:var(--p2)}
  .entry .mid{flex:1; min-width:0}
  .entry .p{font-weight:700; font-size:14px}
  .entry .m{font-size:13px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .entry .a{font-weight:800; font-variant-numeric:tabular-nums; font-size:16px}
  .entry .pend{font-size:10px; color:var(--warn); margin-left:6px}
  .empty{color:var(--muted); font-size:14px; text-align:center; padding:18px 0}

  /* settings */
  #settings{display:none; position:fixed; inset:0; background:var(--bg); padding:20px 18px; overflow:auto; z-index:10}
  #settings.open{display:block}
  #settings label{display:block; font-size:12px; font-weight:700; letter-spacing:.06em;
    text-transform:uppercase; color:var(--muted); margin:14px 0 5px}
  #settings input{width:100%; border:2px solid var(--line); border-radius:12px; padding:12px;
    font-size:16px; font-family:inherit; outline:none; background:#fff}
  #settings .row{display:flex; gap:10px; margin-top:22px}
  #settings button{flex:1; border:none; border-radius:12px; padding:14px; font-size:16px; font-weight:700; cursor:pointer}
  #btnSaveCfg{background:var(--ink); color:#fff}
  #btnCloseCfg{background:#fff; border:2px solid var(--line) !important; color:var(--ink)}
  .hint{font-size:13px; color:var(--muted); line-height:1.45; margin-top:8px}
  #toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(80px);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:999px; font-size:14px;
    font-weight:600; transition:transform .25s; z-index:20; pointer-events:none}
  #toast.show{transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){*{transition:none !important}}
</style>
</head>
<body>

<header>
  <h1>Split3</h1>
  <div class="status"><span class="dot" id="dot"></span><span id="stat">…</span>
    <button class="gear" id="btnGear" aria-label="Settings">⚙︎</button></div>
</header>

<div class="who" id="who"></div>

<div class="amountwrap"><span class="cur">$</span>
  <input id="amount" type="text" inputmode="decimal" placeholder="0.00" autocomplete="off">
</div>

<input id="memo" type="text" placeholder="What was it? (optional)" maxlength="120" autocomplete="off">

<button id="save" disabled>Save expense</button>

<div class="totals" id="totals"></div>

<h2>Recent</h2>
<div id="list"><div class="empty">No expenses yet. Log the first one.</div></div>

<div id="settings">
  <h1 style="font-size:18px;margin:0 0 4px">Settings</h1>
  <p class="hint">Names and the sync link are shared through the Google Sheet — set them once per phone.</p>
  <label>Person 1</label><input id="n0">
  <label>Person 2</label><input id="n1">
  <label>Person 3</label><input id="n2">
  <label>Sync URL (Google Apps Script)</label><input id="url" placeholder="https://script.google.com/macros/s/…/exec">
  <div class="row">
    <button id="btnCloseCfg">Cancel</button>
    <button id="btnSaveCfg">Save</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ====== EDIT DEFAULTS HERE (baked into the repo) ====== */
const DEFAULT_PEOPLE = ["Sham", "Mike", "Erica"];
const DEFAULT_SYNC_URL = "https://script.google.com/macros/s/AKfycbwdFLoeZDUi0yeo7i95XSeKzx-a377Q6UdY6QDL8MX32Fkw9rbkevNYoERnPPGW-hC3/exec";
/* ====================================================== */

const $ = id => document.getElementById(id);
const LS_ENTRIES="s3_entries", LS_REMOTE="s3_remote", LS_CFG="s3_cfg";

let cfg = load(LS_CFG, null) || { people: DEFAULT_PEOPLE.slice(), url: DEFAULT_SYNC_URL };
let entries = load(LS_ENTRIES, []);          // local log: {id,ts,person,amount,memo,synced}
let remote  = load(LS_REMOTE, []);           // entries pulled from the sheet
let selected = null, syncing = false;

function load(k, fb){ try{ return JSON.parse(localStorage.getItem(k)) ?? fb }catch{ return fb } }
function persist(){ localStorage.setItem(LS_ENTRIES, JSON.stringify(entries)) }
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 1800) }
const fmt = n => (Math.round(n*100)/100).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});

/* ---------- UI ---------- */
function renderWho(){
  $("who").innerHTML = cfg.people.map((p,i)=>
    `<button class="${selected===i?`sel c${i}`:''}" data-i="${i}">${esc(p)}</button>`).join("");
  document.querySelectorAll("#who button").forEach(b=>
    b.onclick = () => { selected = +b.dataset.i; renderWho(); updateSave(); });
}
function updateSave(){
  const amt = parseAmount($("amount").value);
  const ok = selected!==null && amt>0;
  const s=$("save"); s.disabled=!ok; s.className = ok?`c${selected}`:"";
}
function parseAmount(v){ const n=parseFloat(String(v).replace(/[^0-9.]/g,"")); return isFinite(n)?n:0 }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])) }

function combined(){
  const seen = new Set(entries.map(e=>String(e.id)));
  return entries.concat(remote.filter(r=>!seen.has(String(r.id))))
    .sort((a,b)=> b.ts - a.ts);
}
function renderData(){
  const all = combined();
  // totals
  const t=[0,0,0];
  all.forEach(e=>{ const i=cfg.people.indexOf(e.person); if(i>=0) t[i]+=Number(e.amount)||0 });
  $("totals").innerHTML = cfg.people.map((p,i)=>
    `<div class="tot c${i}"><div class="n">${esc(p)}</div><div class="v">$${fmt(t[i])}</div></div>`).join("");
  // list
  if(!all.length){ $("list").innerHTML='<div class="empty">No expenses yet. Log the first one.</div>'; return }
  $("list").innerHTML = all.slice(0,40).map(e=>{
    const i = Math.max(0, cfg.people.indexOf(e.person));
    const d = new Date(e.ts).toLocaleDateString(undefined,{month:"short",day:"numeric"});
    return `<div class="entry c${i}"><div class="bar"></div>
      <div class="mid"><div class="p">${esc(e.person)} <span style="color:var(--muted);font-weight:400;font-size:12px">· ${d}</span>${e.synced===false?'<span class="pend">queued</span>':''}</div>
      ${e.memo?`<div class="m">${esc(e.memo)}</div>`:""}</div>
      <div class="a">$${fmt(Number(e.amount))}</div></div>`;
  }).join("");
}
function setStatus(){
  const pending = entries.filter(e=>!e.synced).length;
  const dot=$("dot"), s=$("stat");
  if(!navigator.onLine){ dot.className="dot off"; s.textContent = pending?`offline · ${pending} queued`:"offline"; }
  else if(!cfg.url){ dot.className="dot pend"; s.textContent="no sync URL"; }
  else if(pending){ dot.className="dot pend"; s.textContent=`${pending} queued`; }
  else { dot.className="dot ok"; s.textContent="synced"; }
}

/* ---------- save ---------- */
$("amount").addEventListener("input", updateSave);
$("save").onclick = () => {
  const amt = parseAmount($("amount").value);
  if(selected===null || !(amt>0)) return;
  entries.push({ id: Date.now()+"-"+Math.random().toString(36).slice(2,8),
    ts: Date.now(), person: cfg.people[selected], amount: amt,
    memo: $("memo").value.trim(), synced:false });
  persist();
  $("amount").value=""; $("memo").value=""; updateSave();
  renderData(); setStatus(); toast("Saved ✓");
  sync();
};

/* ---------- sync ---------- */
async function sync(){
  if(syncing || !cfg.url || !navigator.onLine) { setStatus(); return }
  syncing = true;
  try{
    const pending = entries.filter(e=>!e.synced);
    if(pending.length){
      const r = await fetch(cfg.url, { method:"POST",
        headers:{ "Content-Type":"text/plain;charset=utf-8" },
        body: JSON.stringify({ entries: pending.map(({synced, ...e})=>e) }) });
      const j = await r.json();
      if(j.ok){ entries.forEach(e=>{ e.synced = true }); persist(); }
    }
    const g = await fetch(cfg.url + "?limit=100");
    const gj = await g.json();
    if(gj.ok && Array.isArray(gj.entries)){
      remote = gj.entries;
      localStorage.setItem(LS_REMOTE, JSON.stringify(remote));
    }
  }catch(err){ /* stay queued; retry on next open/online */ }
  syncing = false;
  renderData(); setStatus();
}
window.addEventListener("online", sync);
window.addEventListener("offline", setStatus);
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) sync() });

/* ---------- settings ---------- */
$("btnGear").onclick = () => {
  ["n0","n1","n2"].forEach((id,i)=> $(id).value = cfg.people[i]||"");
  $("url").value = cfg.url||"";
  $("settings").classList.add("open");
};
$("btnCloseCfg").onclick = () => $("settings").classList.remove("open");
$("btnSaveCfg").onclick = () => {
  cfg.people = ["n0","n1","n2"].map(id => $(id).value.trim() || "?");
  cfg.url = $("url").value.trim();
  localStorage.setItem(LS_CFG, JSON.stringify(cfg));
  $("settings").classList.remove("open");
  selected = null; renderWho(); updateSave(); renderData(); setStatus(); sync();
};

/* ---------- boot ---------- */
renderWho(); renderData(); setStatus(); updateSave(); sync();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
</body>
</html>
